name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK (split by ABI)
        run: flutter build apk --release --split-per-abi
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD || 'productivityapp123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'productivityapp123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-release-apks
          path: build/app/outputs/apk/release/*.apk
          retention-days: 30
